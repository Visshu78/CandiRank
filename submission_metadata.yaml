ai_usage_summary: |
  Used Gemini via the Antigravity AI coding assistant to set up and verify the candidate ranking execution, check for honeypots, and test formatting rules.

methodology_summary: |
  A rule-based candidate ranker incorporating experience filters (5-9 years preferred), product-company duration scoring, title-matching, and a multiplicative penalty for consulting-only or inactive candidates. Uses an explicit honeypot detection utility to bypass traps. Tie-breaks are handled deterministically using signal counts and candidate IDs.

